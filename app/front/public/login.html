<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="/styles/login.css">
    <title>Pili-Pili</title>
</head>

<body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="top-nav">
        <a class="brand" href="#" aria-label="Accueil Pili-Pili">
            <span class="brand-mark" aria-hidden="true">P</span>
            <span class="brand-text">Pili-Pili</span>
        </a>
        <nav aria-label="Navigation principale">
            <ul class="nav-links">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Concept</a></li>
                <li><a href="#">Aide</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="login-card" aria-labelledby="login-title">
            <p class="eyebrow">Bienvenue</p>
            <h1 id="login-title">Connexion</h1>
            <p class="subtitle">Retrouve ton espace personnel Pili-Pili.</p>

            <form class="login-form" method="post">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input id="name" name="name" type="text" autocomplete="name" placeholder="Ton nom" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input id="password" name="password" type="password" autocomplete="current-password"
                        placeholder="••••••••" required>
                </div>

                <button type="submit">Se connecter</button>
            </form>
        </section>
    </main>
</body>

<script>
    document.querySelector('.login-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const { name, password } = Object.fromEntries(formData.entries());
        console.log('Formulaire soumis - | Name:', name, '| Password:', password);
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password })
        });
        const data = await response.json();
        console.log('Réponse du serveur:', response);
        if (!response.ok) {
            alert('Erreur: ' + data.error);
        } else {
            localStorage.setItem('token', data.token);
            window.location.href = '/';
        }
    });
</script>

</html>
