<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="/styles/login.css">
    <title>Pili-Pili</title>
</head>

<body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="top-nav">
        <a class="brand" href="#" aria-label="Accueil Pili-Pili">
            <span class="brand-mark" aria-hidden="true">P</span>
            <span class="brand-text">Pili-Pili</span>
        </a>
        <nav aria-label="Navigation principale">
            <ul class="nav-links">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Concept</a></li>
                <li><a href="#">Aide</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="login-card" aria-labelledby="login-title">
            <p class="eyebrow">Bienvenue</p>
            <h1 id="login-title">Connexion</h1>
            <p class="subtitle">Retrouve ton espace personnel Pili-Pili.</p>

            <form class="login-form" action="#" method="post" onsubmit="{
                event.preventDefault();
                const formData = new FormData(event.target);
                const { name, password } = Object.fromEntries(formData.entries());
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });
                const data = await response.json();
                console.log(321321321);
                if (!response.ok) {
                    alert(data.error);
                } else {
                    alert('Connexion réussie !');
                }
            }">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input id="name" name="name" type="text" autocomplete="username" placeholder="Ton nom" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input id="password" name="password" type="password" autocomplete="current-password"
                        placeholder="••••••••" required>
                </div>

                <button type="submit">Se connecter</button>
            </form>
        </section>
    </main>
</body>

</html>
